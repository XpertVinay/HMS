server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/rcms.localhost.crt;
    ssl_certificate_key /etc/nginx/ssl/rcms.localhost.key;

    # Proxy all requests to the Laravel web container
    location / {
        proxy_pass http://web:8080;
        
        # Preserve original host and IP so Laravel's TenantResolver sees the correct subdomain
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
