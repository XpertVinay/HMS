version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      - DB_SERVER=db
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - DB_NAME=hms

  db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=hms
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Mount the DB dump to initialize the database
      - "./hms .sql:/docker-entrypoint-initdb.d/init.sql"

volumes:
  db_data:
