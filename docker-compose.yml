version: '3.8'

services:
  web:
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      # - /var/www/html/public/build
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV}
      - APP_DEBUG=${APP_DEBUG}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-hms}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-root}
    networks:
      - hms-network

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - hms-network

  db:
    image: mysql:8.0
    command: --skip-ssl
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-root}
      - MYSQL_DATABASE=${DB_DATABASE:-hms}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - hms-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  db_test:
    image: mysql:8.0
    command: --skip-ssl
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=hms_test
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - db_test_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-root}
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - hms-network

  queue:
    build: .
    command: php artisan queue:work --tries=3 --timeout=90
    restart: always
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-hms}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-root}
    networks:
      - hms-network

volumes:
  db_data:
  db_test_data:

networks:
  hms-network:
    driver: bridge
